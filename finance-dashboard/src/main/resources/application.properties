# ===========================
# Application Configuration
# ===========================
server.port=8080
spring.application.name=finance-dashboard

# ===========================
# H2 Database Configuration
# ===========================
spring.datasource.url=jdbc:h2:mem:financedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ===========================
# JWT Configuration
# ===========================
# NOTE: hardcoded for dev only — in production, use env vars or a secrets manager
app.jwt.secret=ZorvynFinanceDashboardSecretKeyForJwtTokenGeneration2026VerySecureAndLongEnoughKey!!
app.jwt.expiration-ms=86400000

# ===========================
# Swagger / OpenAPI
# ===========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===========================
# Logging
# ===========================
logging.level.com.zorvyn.finance=INFO
logging.level.org.springframework.security=WARN
